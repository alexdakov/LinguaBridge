<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | LinguaBridge</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet"/>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body class="bg-[#f4fafd] flex items-center justify-center min-h-screen p-6 font-['Be_Vietnam_Pro']">
    <div class="glass max-w-md w-full p-10 rounded-[2.5rem] shadow-2xl border border-white">
        <div class="text-center mb-10">
            <img src="Media/linguabridge_logo.png" alt="Logo" class="h-12 mx-auto mb-4">
            <h1 class="text-3xl font-bold font-['Plus_Jakarta_Sans'] text-[#161d1f]">Welcome Back</h1>
            <p class="text-slate-500 text-sm mt-2">Log in to access your learning bridge</p>
        </div>
        <form id="login-form" class="space-y-6" onsubmit="return false;">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Nickname</label>
                <input type="text" id="nickname" class="w-full px-5 py-4 rounded-2xl border border-slate-100 focus:ring-[#FF7582] focus:border-[#FF7582] transition-all bg-white/50" placeholder="e.g., john_doe">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password" class="w-full px-5 py-4 rounded-2xl border border-slate-100 focus:ring-[#FF7582] focus:border-[#FF7582] transition-all bg-white/50 pr-14" placeholder="••••••••">
                    <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#FF7582] transition-colors" aria-label="Show password">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.186-3.411M6.53 6.53A9.97 9.97 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.357 2.674M6.53 6.53L3 3m3.53 3.53l11.94 11.94M3 3l18 18"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Error message -->
            <div id="error-msg" class="hidden flex items-center gap-2 bg-red-50 border border-red-200 text-red-600 text-sm font-semibold px-4 py-3 rounded-2xl">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                <span id="error-text">Wrong nickname or password.</span>
            </div>

            <button id="login-btn" type="button" class="w-full bg-[#FF7582] text-white font-bold py-4 rounded-2xl shadow-lg hover:shadow-rose-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                Sign In
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp({
            apiKey: "AIzaSyDbHTDjWNbskpZ8rDcws5qwRvh-BM2RKgQ",
            authDomain: "linguabridge-2574f.firebaseapp.com",
            projectId: "linguabridge-2574f",
            storageBucket: "linguabridge-2574f.firebasestorage.app",
            messagingSenderId: "640116284028",
            appId: "1:640116284028:web:06a1747abc8db8db20c7f9"
        });
        const auth = getAuth(app);
        const db = getFirestore(app);

        const btn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');
        const form = document.getElementById('login-form');

        function setLoading(loading) {
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                    </svg>
                    Signing in…`;
                btn.classList.add('opacity-80');
            } else {
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
                btn.classList.remove('opacity-80');
            }
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.remove('hidden');
            form.classList.add('shake');
            form.addEventListener('animationend', () => form.classList.remove('shake'), { once: true });
        }

        async function handleLogin() {
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;

            errorMsg.classList.add('hidden');

            if (!nickname || !password) {
                showError('Please enter your nickname and password.');
                return;
            }

            setLoading(true);
            const shadowEmail = `${nickname.toLowerCase()}@linguabridge.com`;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, shadowEmail, password);
                const userSnap = await getDoc(doc(db, "user", userCredential.user.uid));

                if (userSnap.exists()) {
                    const role = userSnap.data().role;
                    window.location.href = role === 'tutor' ? 'tutor-portal.html' : 'student-portal.html';
                } else {
                    setLoading(false);
                    showError('No profile found. Please contact support.');
                }
            } catch (err) {
                setLoading(false);
                const code = err.code;
                if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
                    showError('Wrong nickname or password.');
                } else if (code === 'auth/too-many-requests') {
                    showError('Too many attempts. Please try again later.');
                } else {
                    showError('Login failed. Check your connection and try again.');
                }
            }
        }

        document.getElementById('toggle-password').addEventListener('click', () => {
            const pwd = document.getElementById('password');
            const isHidden = pwd.type === 'password';
            pwd.type = isHidden ? 'text' : 'password';
            document.getElementById('eye-icon').classList.toggle('hidden', isHidden);
            document.getElementById('eye-off-icon').classList.toggle('hidden', !isHidden);
        });

        btn.addEventListener('click', handleLogin);
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
