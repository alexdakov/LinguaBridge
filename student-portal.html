<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&family=Be+Vietnam+Pro:wght@400;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
</head>
<body class="bg-[#f4fafd] text-[#161d1f] font-['Be_Vietnam_Pro'] antialiased">
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <img src="Media/linguabridge_logo.png" alt="Logo" class="h-10">
        <a href="login.html" class="text-sm font-bold text-slate-400 hover:text-[#FF7582]">Log Out</a>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12">
        <div class="mb-12">
            <span class="text-[#FF7582] font-bold text-xs uppercase tracking-widest">Student Dashboard</span>
            <h1 class="text-5xl font-bold font-['Plus_Jakarta_Sans'] mt-2">Hello, <span class="text-[#FF7582]">Learner</span>!</h1>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-[#FF7582]">auto_stories</span>
                        Quick Moodle Guide
                    </h3>
                    <ul class="space-y-4 text-slate-600">
                        <li class="flex gap-4">
                            <span class="bg-rose-50 text-[#FF7582] w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs">1</span>
                            <p>Access your classes via the <strong>"My Courses"</strong> tab in Moodle.</p>
                        </li>
                        <li class="flex gap-4">
                            <span class="bg-rose-50 text-[#FF7582] w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs">2</span>
                            <p>Download PDFs and resources before your live session starts.</p>
                        </li>
                    </ul>
                </div>
                <a href="#" class="block w-full bg-[#FF7582] text-white text-center py-6 rounded-2xl text-xl font-bold hover:shadow-xl transition-all">Enter Moodle Classroom</a>
            </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 h-fit">
                <h4 class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em] mb-6">Current Courses</h4>
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl">
                    <img src="https://flagcdn.com/w40/bg.png" class="w-8 h-auto" alt="Bulgarian">
                    <span class="font-bold">Bulgarian B1</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
