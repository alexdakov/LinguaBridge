<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>e-Portal | LinguaBridge</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-[#f4fafd] font-['Be_Vietnam_Pro'] text-[#161d1f] antialiased overflow-hidden">

<main class="h-screen flex flex-col items-center justify-center gap-4">
    <div class="animate-spin rounded-full h-14 w-14 border-[3px] border-rose-100 border-t-[#FF7582]"></div>
    <p class="text-slate-500 font-semibold text-lg animate-pulse">Checking your account…</p>
</main>

<!-- Firebase auth check: if already logged in send to correct portal, otherwise send to login -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyDbHTDjWNbskpZ8rDcws5qwRvh-BM2RKgQ",
        authDomain: "linguabridge-2574f.firebaseapp.com",
        projectId: "linguabridge-2574f",
        storageBucket: "linguabridge-2574f.firebasestorage.app",
        messagingSenderId: "640116284028",
        appId: "1:640116284028:web:06a1747abc8db8db20c7f9"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            // Not logged in → go to login page
            window.location.href = 'login.html';
            return;
        }
        // Logged in → check role and send to correct portal
        try {
            const snap = await getDoc(doc(db, 'user', user.uid));
            if (snap.exists() && snap.data().role === 'tutor') {
                window.location.href = 'tutor-portal.html';
            } else {
                window.location.href = 'student-portal.html';
            }
        } catch {
            window.location.href = 'student-portal.html';
        }
    });
</script>
</body>
</html>
