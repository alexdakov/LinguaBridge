<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LinguaBridge Academy</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "primary-container": "#ff7582", "secondary": "#815438",
                    "surface-container-low": "#eef5f7", "error": "#ba1a1a",
                    "on-primary-fixed": "#40000d", "on-error": "#ffffff",
                    "surface-container-highest": "#dde4e6", "on-secondary": "#ffffff",
                    "on-primary-container": "#730720", "tertiary": "#645d57",
                    "primary": "#a93444", "outline-variant": "#debfc0",
                    "on-background": "#161d1f", "background": "#f4fafd",
                    "tertiary-fixed-dim": "#cec5bd", "primary-fixed": "#ffdada",
                    "on-secondary-fixed-variant": "#653d23", "surface-container-high": "#e2e9ec",
                    "secondary-container": "#fec29f", "secondary-fixed": "#ffdbc8",
                    "on-primary": "#ffffff", "on-error-container": "#93000a",
                    "on-tertiary": "#ffffff", "surface-tint": "#a93444",
                    "inverse-on-surface": "#ebf2f4", "error-container": "#ffdad6",
                    "on-surface-variant": "#574142", "on-tertiary-fixed-variant": "#4b4640",
                    "surface-container-lowest": "#ffffff", "on-tertiary-container": "#3c3731",
                    "primary-fixed-dim": "#ffb2b6", "secondary-fixed-dim": "#f5ba97",
                    "on-tertiary-fixed": "#1f1b16", "outline": "#8a7172",
                    "on-secondary-container": "#794e32", "inverse-surface": "#2b3234",
                    "on-primary-fixed-variant": "#881b2e", "tertiary-container": "#a8a098",
                    "inverse-primary": "#ffb2b6", "surface-bright": "#f4fafd",
                    "surface-container": "#e8eff1", "surface-variant": "#dde4e6",
                    "tertiary-fixed": "#eae1d8", "surface": "#f4fafd",
                    "on-secondary-fixed": "#311300", "surface-dim": "#d4dbdd",
                    "on-surface": "#161d1f"
                },
                "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                "spacing": { "stack-md": "16px", "margin": "32px", "gutter": "24px", "stack-sm": "8px", "section-padding": "80px", "container-max": "1200px", "stack-lg": "32px" },
                "fontFamily": { "h2": ["Plus Jakarta Sans"], "body-lg": ["Be Vietnam Pro"], "label-md": ["Be Vietnam Pro"], "h1": ["Plus Jakarta Sans"], "body-md": ["Be Vietnam Pro"], "h3": ["Plus Jakarta Sans"] },
                "fontSize": {
                    "h2": ["36px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "1", "fontWeight": "600"}],
                    "h1": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "h3": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}]
                }
            },
        },
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        html, body { height: 100%; overflow: hidden; }
        #moodle-frame {
            width: 100%;
            height: calc(100vh - 64px);
            border: none;
            display: block;
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface antialiased">

<!-- Header bar -->
<header class="h-16 w-full fixed top-0 left-0 z-50 bg-white border-b border-rose-50/60 shadow-sm flex items-center justify-between px-4 md:px-8 gap-3">

    <!-- Back -->
    <a id="back-btn" href="student-portal.html"
       class="shrink-0 group flex items-center gap-2 text-sm font-semibold text-slate-600 bg-slate-50 border border-slate-200 px-4 py-2 rounded-full hover:bg-slate-100 hover:text-slate-900 transition-all">
        <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-0.5 transition-transform">arrow_back</span>
        <span class="hidden sm:inline">Back to Portal</span>
    </a>

    <!-- Branding -->
    <div class="flex items-center gap-2 text-base font-bold text-[#FF7582] tracking-tight">
        <img src="Media/linguabridge_logo.png" alt="LinguaBridge" class="h-6 w-auto">
        <span class="hidden sm:inline">LinguaBridge</span>
        <span class="text-slate-300 font-light mx-1 hidden sm:inline">|</span>
        <span class="text-slate-600 text-sm font-semibold">Academy</span>
    </div>

    <!-- Right side controls -->
    <div class="flex items-center gap-2 shrink-0">
        <!-- Language switcher -->
        <div class="relative">
            <button id="mobile-lang-btn" onclick="toggleMobileLang(event)" class="flex items-center gap-1 bg-rose-50 border border-rose-100 text-[#FF7582] px-3 py-2 rounded-full hover:bg-rose-100 transition-all" title="Language">
                <span class="material-symbols-outlined text-[20px]">language</span>
                <svg class="w-3 h-3 shrink-0" viewBox="0 0 12 12" fill="none"><path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div id="mobile-lang-dropdown" class="hidden absolute right-0 top-11 bg-white rounded-2xl shadow-xl border border-rose-100 p-2 z-50 min-w-[110px]">
                <button onclick="changeGlobalLanguage('en');closeMobileLang()" class="lang-btn lang-btn-en flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-semibold hover:bg-rose-50 transition-all w-full text-left"><img src="https://flagcdn.com/w40/gb.png" alt="EN" class="w-4 h-auto"> EN</button>
                <button onclick="changeGlobalLanguage('bg');closeMobileLang()" class="lang-btn lang-btn-bg flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-semibold hover:bg-rose-50 transition-all opacity-70 w-full text-left text-slate-600"><img src="https://flagcdn.com/w40/bg.png" alt="BG" class="w-4 h-auto"> BG</button>
                <button onclick="changeGlobalLanguage('ru');closeMobileLang()" class="lang-btn lang-btn-ru flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-semibold hover:bg-rose-50 transition-all opacity-70 w-full text-left text-slate-600"><img src="https://flagcdn.com/w40/ru.png" alt="RU" class="w-4 h-auto"> RU</button>
                <button onclick="changeGlobalLanguage('zh');closeMobileLang()" class="lang-btn lang-btn-zh flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-semibold hover:bg-rose-50 transition-all opacity-70 w-full text-left text-slate-600"><img src="https://flagcdn.com/w40/cn.png" alt="ZH" class="w-4 h-auto"> 中文</button>
            </div>
        </div>

        <!-- Show Credentials button -->
        <button id="cred-btn" onclick="openCredModal()"
                class="flex items-center gap-2 text-sm font-semibold text-slate-600 bg-slate-50 border border-slate-200 px-4 py-2 rounded-full hover:bg-slate-100 hover:border-[#FF7582] hover:text-[#FF7582] transition-all">
            <span class="material-symbols-outlined text-[18px]">badge</span>
            <span class="hidden sm:inline">Show Credentials</span>
        </button>
    </div>
</header>

<!-- Content area -->
<div style="margin-top:64px; height:calc(100vh - 64px); position:relative;">

    <!-- Loading overlay -->
    <div id="iframe-loader" class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-[#f4fafd] z-10">
        <div class="animate-spin rounded-full h-14 w-14 border-[3px] border-rose-100 border-t-[#FF7582]"></div>
        <p class="text-slate-500 font-semibold animate-pulse">Opening your classroom…</p>
    </div>

    <!-- Moodle iframe -->
    <iframe
        id="moodle-frame"
        src="about:blank"
        title="Moodle Classroom"
        allow="camera; microphone; fullscreen">
    </iframe>
</div>

<!-- ── Credentials Modal ── -->
<div id="cred-modal"
     class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4"
     onclick="if(event.target===this) closeCredModal()">

    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>

    <!-- Card -->
    <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 flex flex-col gap-6">

        <!-- Header -->
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-rose-50 flex items-center justify-center">
                    <span class="material-symbols-outlined text-[#FF7582] text-[22px]">badge</span>
                </div>
                <div>
                    <h2 class="text-base font-bold text-slate-800">Your Academy Credentials</h2>
                    <p class="text-xs text-slate-400">Click a field to copy</p>
                </div>
            </div>
            <button onclick="closeCredModal()"
                    class="w-8 h-8 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-colors">
                <span class="material-symbols-outlined text-[18px] text-slate-500">close</span>
            </button>
        </div>

        <!-- Username field -->
        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Username</label>
            <button onclick="copyField('modal-user', this)"
                    class="group flex items-center justify-between gap-3 bg-slate-50 border border-slate-200 hover:border-[#FF7582] px-4 py-3 rounded-2xl transition-all text-left w-full">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="material-symbols-outlined text-[18px] text-slate-400 shrink-0">person</span>
                    <span id="modal-user" class="font-mono text-sm text-slate-700 truncate">—</span>
                </div>
                <span id="copy-icon-user" class="material-symbols-outlined text-[16px] text-slate-300 group-hover:text-[#FF7582] shrink-0 transition-colors">content_copy</span>
            </button>
        </div>

        <!-- Password field -->
        <div class="flex flex-col gap-1.5">
            <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Password</label>
            <button onclick="copyField('modal-pass', this)"
                    class="group flex items-center justify-between gap-3 bg-slate-50 border border-slate-200 hover:border-[#FF7582] px-4 py-3 rounded-2xl transition-all text-left w-full">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="material-symbols-outlined text-[18px] text-slate-400 shrink-0">lock</span>
                    <span id="modal-pass" class="font-mono text-sm text-slate-700 truncate">—</span>
                </div>
                <span id="copy-icon-pass" class="material-symbols-outlined text-[16px] text-slate-300 group-hover:text-[#FF7582] shrink-0 transition-colors">content_copy</span>
            </button>
        </div>

        <!-- Hint -->
        <p class="text-xs text-slate-400 text-center leading-relaxed">
            Enter these credentials on the Academy login page in the frame above.
        </p>
    </div>
</div>

<!-- Firebase auth -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp({
        apiKey: "AIzaSyDbHTDjWNbskpZ8rDcws5qwRvh-BM2RKgQ",
        authDomain: "linguabridge-2574f.firebaseapp.com",
        projectId: "linguabridge-2574f",
        storageBucket: "linguabridge-2574f.firebasestorage.app",
        messagingSenderId: "640116284028",
        appId: "1:640116284028:web:06a1747abc8db8db20c7f9"
    });

    const auth = getAuth(app);
    const db   = getFirestore(app);

    onAuthStateChanged(auth, async (fbUser) => {
        if (!fbUser) { window.location.href = 'login.html'; return; }

        try {
            const snap = await getDoc(doc(db, 'users', fbUser.uid));
            if (!snap.exists()) { window.location.href = 'login.html'; return; }

            const data = snap.data();

            // Adjust back-button target for tutors
            if (data.role === 'tutor') {
                document.getElementById('back-btn').href = 'tutor-portal.html';
            }

            // Populate credential modal fields
            const moodleUser = data.moodle_user || '—';
            const moodlePass = data.moodle_pass || '—';
            document.getElementById('modal-user').textContent = moodleUser;
            document.getElementById('modal-pass').textContent = moodlePass;

            // Hide credential button if no credentials stored
            if (!data.moodle_user && !data.moodle_pass) {
                document.getElementById('cred-btn').style.display = 'none';
            }

        } catch (e) {
            console.error(e);
        }

        // Load Academy
        const path = new URLSearchParams(location.search).get('path') || '';
        loadIframe('https://academy.linguabridge.study' + (path || ''));
    });
</script>

<script>
    function loadIframe(url) {
        const frame = document.getElementById('moodle-frame');
        frame.addEventListener('load', () => {
            document.getElementById('iframe-loader').style.display = 'none';
        }, { once: true });
        setTimeout(() => { document.getElementById('iframe-loader').style.display = 'none'; }, 12000);
        frame.src = url;
    }

    function openCredModal() {
        document.getElementById('cred-modal').classList.remove('hidden');
        document.getElementById('cred-modal').classList.add('flex');
    }

    function closeCredModal() {
        document.getElementById('cred-modal').classList.add('hidden');
        document.getElementById('cred-modal').classList.remove('flex');
    }

    function copyField(id, btn) {
        const text = document.getElementById(id).textContent;
        if (!text || text === '—') return;
        navigator.clipboard.writeText(text).then(() => {
            const iconId = id === 'modal-user' ? 'copy-icon-user' : 'copy-icon-pass';
            const icon = document.getElementById(iconId);
            icon.textContent = 'check';
            icon.classList.add('text-green-500');
            icon.classList.remove('text-slate-300');
            setTimeout(() => {
                icon.textContent = 'content_copy';
                icon.classList.remove('text-green-500');
                icon.classList.add('text-slate-300');
            }, 1800);
        });
    }

    // Language switcher
    function toggleMobileLang(e) {
        if (e) e.stopPropagation();
        document.getElementById('mobile-lang-dropdown').classList.toggle('hidden');
    }
    function closeMobileLang() { document.getElementById('mobile-lang-dropdown').classList.add('hidden'); }
    function changeGlobalLanguage(lang) {
        localStorage.setItem('preferredLang', lang);
        closeMobileLang();
        const btns = document.querySelectorAll('.lang-btn');
        btns.forEach(b => { b.classList.remove('text-[#FF7582]', 'bg-rose-50'); b.classList.add('opacity-70', 'text-slate-600'); });
        const active = document.querySelector('.lang-btn-' + lang);
        if (active) { active.classList.add('text-[#FF7582]', 'bg-rose-50'); active.classList.remove('opacity-70', 'text-slate-600'); }
    }
    document.addEventListener('click', function(e) {
        const btn = document.getElementById('mobile-lang-btn');
        const drop = document.getElementById('mobile-lang-dropdown');
        if (drop && !drop.classList.contains('hidden') && !btn?.contains(e.target) && !drop?.contains(e.target)) {
            drop.classList.add('hidden');
        }
    });
    // Init active lang button
    (function() {
        const lang = localStorage.getItem('preferredLang') || 'en';
        const active = document.querySelector('.lang-btn-' + lang);
        if (active) { active.classList.add('text-[#FF7582]', 'bg-rose-50'); active.classList.remove('opacity-70', 'text-slate-600'); }
    })();

    // Escape → close modal or go back to portal
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            const modal = document.getElementById('cred-modal');
            if (!modal.classList.contains('hidden')) {
                closeCredModal();
            } else {
                window.location.href = document.getElementById('back-btn').href;
            }
        }
    });
</script>
</body>
</html>
