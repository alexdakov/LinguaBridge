<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Moodle Classroom | LinguaBridge</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Be+Vietnam+Pro:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        html, body { height: 100%; overflow: hidden; }
        #moodle-frame {
            width: 100%;
            height: calc(100vh - 64px);
            border: none;
            display: block;
        }
    </style>
</head>
<body class="bg-[#f4fafd] font-['Be_Vietnam_Pro'] text-[#161d1f] antialiased">

<!-- Slim header bar -->
<header class="h-16 w-full fixed top-0 left-0 z-50 bg-white border-b border-rose-50/60 shadow-sm flex items-center justify-between px-4 md:px-8">
    <!-- Back button -->
    <a id="back-btn" href="student-portal.html"
       class="group flex items-center gap-2 text-sm font-semibold text-slate-600 bg-slate-50 border border-slate-200 px-4 py-2 rounded-full hover:bg-slate-100 hover:text-slate-900 transition-all">
        <span class="material-symbols-outlined text-[18px] group-hover:-translate-x-0.5 transition-transform">arrow_back</span>
        <span>Back to Portal</span>
    </a>

    <!-- Branding -->
    <a href="index.html" class="flex items-center gap-2 text-lg font-bold text-[#FF7582] tracking-tight">
        <img src="Media/linguabridge_logo.png" alt="LinguaBridge" class="h-7 w-auto">
        <span class="hidden sm:inline">LinguaBridge</span>
        <span class="hidden sm:inline text-slate-300 font-light mx-1">|</span>
        <span class="hidden sm:inline text-slate-500 text-sm font-medium">Moodle Classroom</span>
    </a>

    <!-- Status indicator (shows login state) -->
    <div id="login-status" class="flex items-center gap-2 text-sm text-slate-400">
        <div class="animate-spin rounded-full h-4 w-4 border-2 border-rose-100 border-t-[#FF7582]"></div>
        <span class="hidden sm:inline">Connecting…</span>
    </div>
</header>

<!-- Content area -->
<div style="margin-top:64px; height:calc(100vh - 64px); position:relative;">

    <!-- Loading overlay -->
    <div id="iframe-loader" class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-[#f4fafd] z-10">
        <div class="animate-spin rounded-full h-14 w-14 border-[3px] border-rose-100 border-t-[#FF7582]"></div>
        <p id="loader-text" class="text-slate-500 font-semibold animate-pulse">Signing you in to Moodle…</p>
    </div>

    <!-- The Moodle iframe (src set by JS after auto-login) -->
    <iframe
        id="moodle-frame"
        src="about:blank"
        title="Moodle Classroom"
        allow="camera; microphone; fullscreen"
        name="moodle-frame">
    </iframe>
</div>

<!-- Firebase auth + auto-login logic -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const MOODLE_BASE = 'http://132.145.38.243/moodle';

    const app = initializeApp({
        apiKey: "AIzaSyDbHTDjWNbskpZ8rDcws5qwRvh-BM2RKgQ",
        authDomain: "linguabridge-2574f.firebaseapp.com",
        projectId: "linguabridge-2574f",
        storageBucket: "linguabridge-2574f.firebasestorage.app",
        messagingSenderId: "640116284028",
        appId: "1:640116284028:web:06a1747abc8db8db20c7f9"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    onAuthStateChanged(auth, async (firebaseUser) => {
        if (!firebaseUser) { window.location.href = 'login.html'; return; }

        try {
            const snap = await getDoc(doc(db, 'user', firebaseUser.uid));
            if (!snap.exists()) { window.location.href = 'login.html'; return; }

            const data = snap.data();

            // Set back button destination based on role
            if (data.role === 'tutor') {
                document.getElementById('back-btn').href = 'tutor-portal.html';
            }

            // Attempt Moodle auto-login with stored credentials
            const moodleUser = data.moodle_user;
            const moodlePass = data.moodle_pass;

            if (moodleUser && moodlePass) {
                await launchMoodle(moodleUser, moodlePass);
            } else {
                // No credentials stored — open Moodle login page directly
                loadIframe(MOODLE_BASE + '/login/index.php');
            }

        } catch (e) {
            console.error('Portal load error:', e);
            loadIframe(MOODLE_BASE + '/login/index.php');
        }
    });

    /**
     * Try Moodle auto-login via mobile app token → autologin key.
     * Falls back to plain login page if anything fails.
     */
    async function launchMoodle(username, password) {
        try {
            setStatus('Signing you in to Moodle…');

            // 1. Get user's personal Moodle token via token.php
            const tokenRes = await fetch(`${MOODLE_BASE}/login/token.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&service=moodle_mobile_app`
            });
            const tokenData = await tokenRes.json();

            if (!tokenData.token) {
                throw new Error(tokenData.error || 'Token not issued (mobile service may be disabled)');
            }

            // 2. Use the personal token to get an autologin key
            const keyRes = await fetch(
                `${MOODLE_BASE}/webservice/rest/server.php?wstoken=${encodeURIComponent(tokenData.token)}&wsfunction=tool_mobile_get_autologin_key&moodlewsrestformat=json`
            );
            const keyData = await keyRes.json();

            if (keyData.exception || !keyData.key || !keyData.autologinurl) {
                throw new Error(keyData.message || 'Autologin key not available');
            }

            // 3. Load the autologin URL into the iframe — Moodle creates a session
            const autoUrl = `${keyData.autologinurl}?key=${encodeURIComponent(keyData.key)}`;
            setStatus('Logged in ✓', true);
            loadIframe(autoUrl);

        } catch (err) {
            console.warn('Moodle auto-login failed, using login page:', err.message);
            // Graceful fallback: load Moodle login page with username pre-filled via URL
            setStatus('Opening Moodle…');
            loadIframe(`${MOODLE_BASE}/login/index.php`);
        }
    }

    function loadIframe(url) {
        const frame  = document.getElementById('moodle-frame');
        const loader = document.getElementById('iframe-loader');

        frame.onload = () => {
            loader.style.display = 'none';
        };

        // Safety net: hide loader after 15s regardless
        setTimeout(() => { loader.style.display = 'none'; }, 15000);

        frame.src = url;
    }

    function setStatus(text, success = false) {
        const el = document.getElementById('login-status');
        if (success) {
            el.innerHTML = `<span class="material-symbols-outlined text-green-500 text-[18px]">check_circle</span><span class="hidden sm:inline text-green-600 font-semibold">${text}</span>`;
        } else {
            el.innerHTML = `<div class="animate-spin rounded-full h-4 w-4 border-2 border-rose-100 border-t-[#FF7582]"></div><span class="hidden sm:inline">${text}</span>`;
        }
    }
</script>

<script>
    // Escape key → back to portal
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') window.location.href = document.getElementById('back-btn').href;
    });
</script>
</body>
</html>
